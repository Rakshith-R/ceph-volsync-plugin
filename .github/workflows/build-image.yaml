---
name: Build container images

# yamllint disable-line rule:truthy
on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - main
      - 'release-*'

jobs:
  build_bundle:
    name: build_bundle
    if: github.repository == 'ramendr/ceph-volsync-plugin'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate image tag
        id: tag
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == release-* ]]; then
            version=$(echo "${{ github.ref_name }}" | sed 's/release-//')
            echo "tag=v${version}-latest" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Generate the bundle contents
        run: make bundle

      - name: Login to quay.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push bundle container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bundle.Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: quay.io/ramendr/ceph-volsync-plugin-operator-bundle:${{ steps.tag.outputs.tag }}

  build_controller:
    name: build_controller
    if: github.repository == 'ramendr/ceph-volsync-plugin'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: tag
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == release-* ]]; then
            version=$(echo "${{ github.ref_name }}" | sed 's/release-//')
            echo "tag=v${version}-latest" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Login to quay.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push controller container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Containerfile.manager
          platforms: ${{ vars.BUILD_PLATFORMS }}
          push: ${{ github.event_name == 'push' }}
          tags: quay.io/ramendr/ceph-volsync-plugin-operator:${{ steps.tag.outputs.tag }}

  build_mover:
    name: build_mover
    if: github.repository == 'ramendr/ceph-volsync-plugin'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: tag
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == release-* ]]; then
            version=$(echo "${{ github.ref_name }}" | sed 's/release-//')
            echo "tag=v${version}-latest" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Login to quay.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push sidecar container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Containerfile.mover
          platforms: ${{ vars.BUILD_PLATFORMS }}
          push: ${{ github.event_name == 'push' }}
          tags: quay.io/ramendr/ceph-volsync-plugin-mover:${{ steps.tag.outputs.tag }}
