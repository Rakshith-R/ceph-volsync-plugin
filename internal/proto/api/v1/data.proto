syntax = "proto3";

package api.v1;

option go_package = "github.com/RamenDR/ceph-volsync-plugin/internal/proto/api/v1";

// DataService provides streaming sync and deletion APIs.
service DataService {
  // Sync opens a bidirectional streaming RPC for data transfer.
  // Source sends WriteRequests, destination responds with
  // acknowledged request IDs for window release.
  rpc Sync(stream SyncRequest) returns (stream SyncResponse);

  // Delete removes files or directories at the specified paths.
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

// --------------------
// Core Types
// --------------------

// ChangedBlock represents a modified data range.
message ChangedBlock {
  // Byte offset where the write should begin.
  uint64 offset = 1;

  // Length of the write in bytes.
  uint64 length = 2;

  // Data payload. May be empty if is_zero is true.
  bytes data = 3;

  // Indicates this write represents a zeroed range.
  bool is_zero = 4;

  // Unique ID for deduplication and tracking.
  uint64 request_id = 5;

  // Compression algorithm applied to data.
  CompressionAlgo compression = 6;

  // Total size of the file or device in bytes.
  uint64 total_size = 7;
}

// CompressionAlgo specifies the compression format used for block data.
enum CompressionAlgo {
  COMPRESSION_NONE = 0;
  COMPRESSION_LZ4 = 1;
  COMPRESSION_ZSTD = 2;
}

// --------------------
// Requests
// --------------------

// SyncRequest wraps a write operation sent over the stream.
message SyncRequest {
  // Field 3 was CommitRequest, now in CommitService.
  reserved 3;

  oneof operation {
    WriteRequest write = 1;
  }
}

// WriteRequest represents a batched write operation.
message WriteRequest {
  // Target path or object identifier.
  string path = 1;

  // List of changed blocks to be written.
  repeated ChangedBlock blocks = 2;
}

// DeleteRequest represents a batch file or directory deletion operation.
message DeleteRequest {
  // Target paths to files or directories to delete (recursive by default).
  repeated string paths = 1;
}

// --------------------
// Responses
// --------------------

// SyncResponse carries acknowledged request IDs
// for window release on the source side.
message SyncResponse {
  // Request IDs that the destination has processed.
  repeated uint64 acknowledged_ids = 1;
}

// DeleteResponse is empty on success.
// Errors are reported via gRPC status codes.
message DeleteResponse {}
