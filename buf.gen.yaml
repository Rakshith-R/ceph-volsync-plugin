version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/RamenDR/ceph-volsync-plugin
plugins:
  - remote: buf.build/protocolbuffers/go
    out: internal/mover/proto
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: internal/mover/proto
    opt:
      - paths=source_relative