---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dest-pvc
  labels:
    group: snapshot-test
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: rook-cephfs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: src-pvc
  labels:
    group: snapshot-test
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: rook-cephfs
